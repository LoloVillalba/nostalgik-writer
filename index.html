<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostalgik Writer</title>
    <!-- Scripts oficiales de Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            /* Colores extraídos de la imagen adjunta */
            --bg-color: #0b1114;
            --text-color: #a7c0c4;
            --border-color: #2a3a3f;
            --font-family: 'Courier New', Consolas, monospace;
            --selection-bg: #a7c0c4;
            --selection-text: #0b1114;
        }

        body.light-mode {
            --bg-color: #f0f0f0;
            --text-color: #1a1a1a;
            --border-color: #cccccc;
            --selection-bg: #1a1a1a;
            --selection-text: #f0f0f0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        ::selection {
            background-color: var(--selection-bg);
            color: var(--selection-text);
        }

        /* Barra de Herramientas */
        #toolbar {
            border-bottom: 1px solid var(--border-color);
            padding: 8px 15px;
            display: flex;
            gap: 10px;
            background-color: var(--bg-color);
            flex-wrap: wrap;
            align-items: center;
        }

        button {
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 4px 12px;
            font-family: inherit;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
            transition: all 0.1s;
        }

        button:hover, button:active {
            background: var(--text-color);
            color: var(--bg-color);
        }

        button.highlight {
            border-color: var(--text-color);
            border-style: dashed;
        }

        /* Regla superior estilo retro */
        #ruler {
            font-family: var(--font-family);
            font-size: 12px;
            color: var(--border-color);
            white-space: pre;
            padding: 2px 40px;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            user-select: none;
            overflow: hidden;
            letter-spacing: 0.1em;
        }

        /* Área de Edición */
        #editor-container {
            flex: 1;
            padding: 20px 40px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
        }

        #editor {
            width: 100%;
            max-width: 850px; 
            outline: none;
            font-size: 16px;
            line-height: 1.5;
            white-space: pre-wrap;
            tab-size: 4;
            min-height: 100%;
            /* Efecto CRT sutil */
            text-shadow: 0px 0px 2px rgba(167, 192, 196, 0.4);
        }

        /* Barra de estado / Mensajes */
        #status-bar {
            border-top: 1px solid var(--border-color);
            padding: 5px 15px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }

        #message-log {
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Modales */
        dialog {
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 2px solid var(--text-color);
            padding: 20px;
            width: 90%;
            max-width: 500px;
            font-family: var(--font-family);
        }
        
        dialog::backdrop {
            background: rgba(0,0,0,0.8);
        }

        dialog h3 { margin-top: 0; text-transform: uppercase; border-bottom: 1px solid var(--border-color); padding-bottom: 5px;}
        dialog input {
            width: 100%;
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 5px;
            margin-bottom: 15px;
            font-family: inherit;
        }
        
        .file-list {
            list-style: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            margin-bottom: 15px;
        }

        .file-item {
            padding: 8px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }

        .file-item:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }

        .help-text { font-size: 11px; color: #779; margin-bottom: 15px; }

    </style>
</head>
<body>

    <div id="toolbar">
        <button onclick="newDocument()" title="Nuevo documento">Nuevo</button>
        <button onclick="listDriveFiles()" title="Abrir de Drive">Abrir</button>
        <span style="border-left: 1px solid var(--border-color); margin: 0 5px; height: 20px;"></span>
        
        <button onclick="formatText('bold')" title="Negrita"><b>N</b></button>
        <button onclick="formatText('italic')" title="Cursiva"><i>K</i></button>
        <span style="border-left: 1px solid var(--border-color); margin: 0 5px; height: 20px;"></span>
        
        <button onclick="alignText('justifyLeft')" title="Alinear Izquierda">|&equiv;</button>
        <button onclick="alignText('justifyCenter')" title="Centrar">&equiv;</button>
        <button onclick="alignText('justifyRight')" title="Alinear Derecha">&equiv;|</button>
        <button onclick="alignText('justifyFull')" title="Justificar">&equiv;&equiv;</button>
        <span style="border-left: 1px solid var(--border-color); margin: 0 5px; height: 20px;"></span>

        <button onclick="toggleTheme()" title="Invertir colores">Invertir</button>
        <span style="border-left: 1px solid var(--border-color); margin: 0 5px; height: 20px;"></span>
        
        <button id="btn-drive-action" class="highlight" onclick="handleDriveAction()">Conectar Drive</button>
        <button id="btn-save-as" style="display:none;" onclick="saveToDrive(true)">Guardar como...</button>
        <button onclick="document.getElementById('drive-config').showModal()">⚙️</button>
    </div>

    <!-- Regla decorativa superior -->
    <div id="ruler"></div>

    <div id="editor-container">
        <div id="editor" contenteditable="true" spellcheck="false">
[NUEVO DOCUMENTO]

Escribe tu propio texto a partir de aquí...</div>
    </div>

    <div id="status-bar">
        <span id="system-status">NOSTALGIK WRITER V1.1_</span>
        <span id="message-log"></span>
    </div>

    <!-- Modal Configuración Drive -->
    <dialog id="drive-config">
        <h3>Configuración API Google Drive</h3>
        <p class="help-text">Para guardar directamente en tu nube, necesitas crear un <b>ID de cliente de OAuth (Aplicación Web)</b> en Google Cloud Console.</p>
        
        <label>Client ID de OAuth:</label>
        <input type="text" id="client-id-input" placeholder="ejemplo: 12345678-abcd.apps.googleusercontent.com">
        
        <div style="text-align: right; margin-top: 10px;">
            <button onclick="document.getElementById('drive-config').close()">Cancelar</button>
            <button onclick="saveConfig()">Guardar Configuración</button>
        </div>
    </dialog>

    <!-- Modal Explorador de Archivos -->
    <dialog id="drive-explorer">
        <h3>Abrir de Google Drive</h3>
        <div id="file-list-container" class="file-list">
            <!-- Los archivos aparecerán aquí -->
            <div class="file-item">Cargando lista...</div>
        </div>
        <div style="text-align: right; margin-top: 10px;">
            <button onclick="document.getElementById('drive-explorer').close()">Cerrar</button>
        </div>
    </dialog>

    <script>
        // --- UI & EDITOR BASICS ---
        
        function logMessage(msg) {
            const logArea = document.getElementById('message-log');
            logArea.innerText = `[ ${msg.toUpperCase()} ]`;
            logArea.style.animation = 'none'; 
            setTimeout(() => {
                logArea.innerText = '';
                logArea.style.animation = 'blink 1s step-end infinite';
            }, 4000);
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            logMessage('TEMA INVERTIDO');
        }

        function formatText(command) {
            document.execCommand(command, false, null);
            document.getElementById('editor').focus();
        }

        function alignText(command) {
            document.execCommand(command, false, null);
            document.getElementById('editor').focus();
        }

        // Tabulador invisible y estándar
        document.getElementById('editor').addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                document.execCommand('insertText', false, '\t');
            }
        });

        // Generar la regla superior (Ruler)
        function generateRuler() {
            let ruler = "";
            for(let i=1; i<=80; i++) {
                if (i % 10 === 0) ruler += (i/10);
                else if (i % 5 === 0) ruler += "+";
                else ruler += ".";
            }
            document.getElementById('ruler').innerText = ruler;
        }

        // --- GOOGLE DRIVE INTEGRATION ---

        let tokenClient;
        let accessToken = null;
        let currentDriveFileId = null; 
        let documentTitle = "Guion_Sin_Titulo";

        window.onload = () => {
            generateRuler();
            const savedClientId = localStorage.getItem('gdrive_client_id');
            if(savedClientId) document.getElementById('client-id-input').value = savedClientId;
            
            const savedData = localStorage.getItem('nostalgik_save');
            if (savedData) document.getElementById('editor').innerHTML = savedData;
            
            document.getElementById('editor').focus();
            initGoogleAPI();
        }

        document.getElementById('editor').addEventListener('input', () => {
            localStorage.setItem('nostalgik_save', document.getElementById('editor').innerHTML);
        });

        function saveConfig() {
            const clientId = document.getElementById('client-id-input').value.trim();
            localStorage.setItem('gdrive_client_id', clientId);
            document.getElementById('drive-config').close();
            initGoogleAPI();
            logMessage('Credenciales guardadas');
        }

        function initGoogleAPI() {
            const clientId = localStorage.getItem('gdrive_client_id');
            if (!clientId) return;

            if (window.google && google.accounts) {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: clientId,
                    scope: 'https://www.googleapis.com/auth/drive.file',
                    callback: (tokenResponse) => {
                        if (tokenResponse && tokenResponse.access_token) {
                            accessToken = tokenResponse.access_token;
                            document.getElementById('btn-drive-action').innerText = "Guardar en Drive";
                            document.getElementById('btn-save-as').style.display = "inline-block";
                            logMessage('Conectado a Drive');
                        }
                    },
                });
            }
        }

        function handleDriveAction() {
            const clientId = localStorage.getItem('gdrive_client_id');
            if (!clientId) {
                document.getElementById('drive-config').showModal();
                return;
            }

            if (!accessToken) {
                tokenClient.requestAccessToken();
            } else {
                saveToDrive();
            }
        }

        // Función para limpiar el editor y empezar de cero
        function newDocument() {
            if (confirm("¿Seguro que quieres empezar un nuevo documento? Se limpiará el editor (aunque el archivo en Drive seguirá guardado).")) {
                document.getElementById('editor').innerHTML = "[NUEVO DOCUMENTO]<br><br>";
                currentDriveFileId = null;
                documentTitle = "Guion_Sin_Titulo";
                localStorage.removeItem('nostalgik_save');
                logMessage('NUEVO DOCUMENTO INICIADO');
            }
        }

        // Listar archivos del usuario creados con la app
        async function listDriveFiles() {
            if (!accessToken) {
                alert("Primero debes 'Conectar Drive'");
                return;
            }

            logMessage('Buscando archivos...');
            document.getElementById('drive-explorer').showModal();
            const listContainer = document.getElementById('file-list-container');
            listContainer.innerHTML = '<div class="file-item">Cargando...</div>';

            try {
                const response = await fetch('https://www.googleapis.com/drive/v3/files?q=mimeType=\'text/plain\'&fields=files(id, name)', {
                    headers: { 'Authorization': 'Bearer ' + accessToken }
                });
                const data = await response.json();
                
                listContainer.innerHTML = "";
                if (data.files && data.files.length > 0) {
                    data.files.forEach(file => {
                        const div = document.createElement('div');
                        div.className = "file-item";
                        div.innerText = file.name;
                        div.onclick = () => loadFileFromDrive(file.id, file.name);
                        listContainer.appendChild(div);
                    });
                } else {
                    listContainer.innerHTML = '<div class="file-item">No se encontraron archivos .txt</div>';
                }
            } catch (error) {
                logMessage('Error al listar');
            }
        }

        // Cargar el contenido de un archivo seleccionado
        async function loadFileFromDrive(fileId, fileName) {
            logMessage('Abriendo...');
            try {
                const response = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                    headers: { 'Authorization': 'Bearer ' + accessToken }
                });
                const text = await response.text();
                
                document.getElementById('editor').innerText = text;
                currentDriveFileId = fileId;
                documentTitle = fileName.replace('.txt', '');
                
                document.getElementById('drive-explorer').close();
                logMessage('Archivo cargado');
            } catch (error) {
                logMessage('Error al cargar');
            }
        }

        async function saveToDrive(forceNew = false) {
            if (!accessToken) return;

            // Si es nuevo o pedimos "Guardar como", preguntamos el título
            if (!currentDriveFileId || forceNew) {
                let userTitle = prompt("Introduce el título del documento:", forceNew ? documentTitle + "_copia" : documentTitle);
                if (userTitle === null) return;
                documentTitle = userTitle;
                if (forceNew) currentDriveFileId = null; // Reiniciar ID para crear uno nuevo
            }

            logMessage('Guardando...');
            const textContent = document.getElementById('editor').innerText;
            
            const metadata = {
                name: `${documentTitle}.txt`,
                mimeType: 'text/plain'
            };

            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            form.append('file', new Blob([textContent], { type: 'text/plain' }));

            try {
                let url = 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
                let method = 'POST';

                if (currentDriveFileId) {
                    url = `https://www.googleapis.com/upload/drive/v3/files/${currentDriveFileId}?uploadType=multipart`;
                    method = 'PATCH';
                }

                const response = await fetch(url, {
                    method: method,
                    headers: { 'Authorization': 'Bearer ' + accessToken },
                    body: form
                });

                const data = await response.json();
                
                if (data.id) {
                    currentDriveFileId = data.id;
                    logMessage(`Guardado OK`);
                }
            } catch (error) {
                logMessage('Error al guardar');
            }
        }

    </script>
</body>
</html>
